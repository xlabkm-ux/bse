name: Pilot Mission CI Preview

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  unity-pilot-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Report Unity pilot command
        run: |
          echo "This workflow is a CI preview placeholder."
          echo "It does not run Unity on GitHub Actions until a licensed Unity runner is configured."
          echo "Local validation command:"
          echo "Unity -batchmode -projectPath . -executeMethod BreachScenarioEngine.Editor.CI.PilotMissionPipelineCi.RunAll -quit"
      - name: Upload local pilot report artifacts when present
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pilot-mission-reports
          path: Artifacts/PilotReports
          if-no-files-found: warn
