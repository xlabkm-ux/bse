# Template schema version. Pilot operation accepts only v2.3 templates.
schemaVersion: "tb.mission_template.v2.3"

# Unique mission id. Must match the containing folder name.
missionId: "VS03_StealthSafehouse"

# Human-readable mission title shown by pilot runtime UI.
missionTitle: "Stealth Safehouse"

generationMeta:
  # Authored deterministic seed. The pipeline writes the accepted effective seed.
  initialSeed: 912447
  # Legacy compatibility only. Keep zero in authored templates.
  effectiveSeed: 0
  generationTimeout: 60
  maxRetries: 7

spatialConstraints:
  # Compact stealth footprint with stricter acoustic rules.
  worldBounds: [72, 56]
  pixelsPerUnit: 128
  tacticalTheme: "stealth_facility"
  bspConstraints:
    minRoomSize: [4, 4]
    maxRoomSize: [10, 10]
    corridorWidth: 2
    forceRoomAdjacency: true

tacticalRules:
  noiseAlertThreshold: 0.10
  strictNavigationPolicy: true
  enforcePostLayoutPlacement: true
  acousticOcclusion:
    wallMultiplier: 3.5
    doorPenalty: 1.8

actorRoster:
  # Small entry team emphasizes stealth route validation.
  - id: "OP_01"
    type: "Operative"
    countRange: [2, 3]
    navigationPolicy: "FullAccess"
    placementPolicy: "EntryPointOnly"

  # Static guards exercise safe tagged-room placement.
  - id: "EN_01"
    type: "Sentry"
    countRange: [3, 5]
    navigationPolicy: "StaticGuard"
    placementPolicy: "PostLayout_TaggedRoom"

  # Low roamer count prevents excessive density in the stealth mission.
  - id: "EN_02"
    type: "Roamer"
    countRange: [1, 2]
    navigationPolicy: "CanOpenDoors"
    placementPolicy: "PostLayout_AnyRoom"

  # Hostage must be placed only after a current layout exists.
  - id: "CIV_01"
    type: "Hostage"
    countRange: [1, 1]
    navigationPolicy: "Immobilized"
    placementPolicy: "SecureRoomOnly"

objectives:
  primary:
    # Rescue objective verifies acoustic and navigation reachability together.
    - id: "OBJ_EXTRACT_HOSTAGE"
      type: "RescueHostage"
      requiresLayoutGraph: true
      targetRoomTag: "security_vault"
  secondary:
    # Optional non-alarm objective documents the stealth success condition.
    - id: "OBJ_NO_ALARM"
      type: "AvoidAlarm"
      optional: true
