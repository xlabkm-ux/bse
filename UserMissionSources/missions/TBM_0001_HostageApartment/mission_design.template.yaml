schemaVersion: "tb.mission_template.v2.2"
missionId: "TBM_0001_HostageApartment"
missionTitle: "Hostage Apartment"

generationMeta:
  initialSeed: 428193
  effectiveSeed: 0
  generationTimeout: 45
  maxRetries: 5

spatialConstraints:
  worldBounds: [64, 64]
  pixelsPerUnit: 128
  tacticalTheme: "urban_cqb"
  bspConstraints:
    minRoomSize: [4, 4]
    maxRoomSize: [12, 12]
    corridorWidth: 2
    forceRoomAdjacency: true

tacticalRules:
  noiseAlertThreshold: 0.15
  strictNavigationPolicy: true
  enforcePostLayoutPlacement: true
  acousticOcclusion:
    wallMultiplier: 2.5
    doorPenalty: 1.2

actorRoster:
  - id: "OP_01"
    type: "Operative"
    countRange: [2, 4]
    navigationPolicy: "FullAccess"
    placementPolicy: "EntryPointOnly"
  - id: "EN_01"
    type: "Sentry"
    countRange: [3, 6]
    navigationPolicy: "StaticGuard"
    placementPolicy: "PostLayout_TaggedRoom"
  - id: "EN_02"
    type: "Roamer"
    countRange: [1, 2]
    navigationPolicy: "CanOpenDoors"
    placementPolicy: "PostLayout_AnyRoom"
  - id: "CIV_01"
    type: "Hostage"
    countRange: [1, 2]
    navigationPolicy: "Immobilized"
    placementPolicy: "SecureRoomOnly"

objectives:
  primary:
    - id: "OBJ_MAIN"
      type: "RescueHostage"
      requiresLayoutGraph: true
      targetRoomTag: "security_vault"
  secondary:
    - id: "OBJ_DATA"
      type: "CollectItem"
      optional: true
