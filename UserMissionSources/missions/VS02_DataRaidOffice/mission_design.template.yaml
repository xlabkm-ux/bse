# Template schema version. Pilot operation accepts only v2.3 templates.
schemaVersion: "tb.mission_template.v2.3"

# Unique mission id. Must match the containing folder name.
missionId: "VS02_DataRaidOffice"

# Human-readable mission title shown by pilot runtime UI.
missionTitle: "Data Raid Office"

generationMeta:
  # Authored deterministic seed. The pipeline writes the accepted effective seed.
  initialSeed: 731204
  # Legacy compatibility only. Keep zero in authored templates.
  effectiveSeed: 0
  generationTimeout: 60
  maxRetries: 5

spatialConstraints:
  # Wider office footprint used to exercise alternate routes and density.
  worldBounds: [80, 64]
  pixelsPerUnit: 128
  tacticalTheme: "urban_cqb"
  bspConstraints:
    minRoomSize: [5, 5]
    maxRoomSize: [14, 12]
    corridorWidth: 2
    forceRoomAdjacency: true

tacticalRules:
  noiseAlertThreshold: 0.22
  strictNavigationPolicy: true
  enforcePostLayoutPlacement: true
  acousticOcclusion:
    wallMultiplier: 2.2
    doorPenalty: 1.0

actorRoster:
  # Entry team starts only at generated breach/entry nodes.
  - id: "OP_01"
    type: "Operative"
    countRange: [3, 4]
    navigationPolicy: "FullAccess"
    placementPolicy: "EntryPointOnly"

  # Static guards prefer tagged objective/security rooms after layout exists.
  - id: "EN_01"
    type: "Sentry"
    countRange: [4, 7]
    navigationPolicy: "StaticGuard"
    placementPolicy: "PostLayout_TaggedRoom"

  # Roamers verify non-hostage placement in several rooms.
  - id: "EN_02"
    type: "Roamer"
    countRange: [2, 3]
    navigationPolicy: "CanOpenDoors"
    placementPolicy: "PostLayout_AnyRoom"

objectives:
  primary:
    # Main data objective must resolve against the generated layout graph.
    - id: "OBJ_DATA_MAIN"
      type: "CollectItem"
      requiresLayoutGraph: true
      targetRoomTag: "security_vault"
  secondary:
    # Optional backup media checks secondary objective placement.
    - id: "OBJ_SERVER_BACKUP"
      type: "CollectItem"
      optional: true
